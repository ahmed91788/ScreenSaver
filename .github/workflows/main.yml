name: Release macOS

on:
  push:
    tags:
      - "v*"

jobs:
  build-sign:
    name: Build and Sign macOS App
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download unsigned app zip from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist

          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*unsigned*.zip" \
            --dir dist

          ls -la dist

      - name: Extract unsigned app
        run: |
          mkdir -p unsigned

          ditto -x -k dist/*unsigned*.zip unsigned
          rm -rf unsigned/__MACOSX

          find unsigned -name ".DS_Store" -delete

          APP_PATH="$(find unsigned -path "*/__MACOSX/*" -prune -o -name "*.app" -type d -print | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          echo "Found app: $APP_PATH"

          # Clean bad metadata BEFORE signing only
          xattr -cr "$APP_PATH"

          find unsigned -path "*/__MACOSX/*" -prune -o -name "*.app" -type d -print

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain

          security find-identity -v -p codesigning

      - name: Sign Automator app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="$(find unsigned -path "*/__MACOSX/*" -prune -o -name "*.app" -type d -print | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          echo "Signing app: $APP_PATH"

          find "$APP_PATH" -name ".DS_Store" -delete

          # IMPORTANT:
          # Do not run xattr -cr after this point.
          # document.wflow signature may be stored in extended attributes.

          if [ -e "$APP_PATH/Contents/document.wflow" ]; then
            echo "Signing Automator workflow: $APP_PATH/Contents/document.wflow"

            codesign --force --timestamp \
              --sign "$APPLE_SIGNING_IDENTITY" \
              "$APP_PATH/Contents/document.wflow"

            codesign --verify --verbose=4 \
              "$APP_PATH/Contents/document.wflow"
          fi

          # Important for Automator apps: do NOT use --deep
          codesign --force --options runtime \
            --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH"

          codesign --verify --strict --verbose=4 "$APP_PATH"

          # Preserve extended attributes after signing.
          # Do NOT use --norsrc or --noextattr here.
          ditto -c -k --keepParent "$APP_PATH" signed-app.zip

      - name: Upload signed app zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-macos-artifacts
          path: signed-app.zip
          if-no-files-found: error

  notarize-release:
    name: Notarize and Release macOS App
    needs: build-sign
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Download signed app zip
        uses: actions/download-artifact@v4
        with:
          name: signed-macos-artifacts
          path: downloaded

      - name: Extract signed app
        run: |
          mkdir -p artifacts

          # Extract while preserving extended attributes.
          ditto -x -k downloaded/signed-app.zip artifacts

          APP_PATH="$(find artifacts -path "*/__MACOSX/*" -prune -o -name "*.app" -type d -print | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Found signed app: $APP_PATH"

          # Do NOT run xattr -cr here.
          # It can remove the document.wflow signature.

          codesign --verify --strict --verbose=4 "$APP_PATH"

          if [ -e "$APP_PATH/Contents/document.wflow" ]; then
            codesign --verify --verbose=4 "$APP_PATH/Contents/document.wflow"
          fi

      - name: Prepare app for notarization
        run: |
          # Do NOT run xattr -cr here.
          # Do NOT use --norsrc or --noextattr after signing.

          codesign --verify --strict --verbose=4 "$APP_PATH"

          if [ -e "$APP_PATH/Contents/document.wflow" ]; then
            codesign --verify --verbose=4 "$APP_PATH/Contents/document.wflow"
          fi

          ditto -c -k --keepParent "$APP_PATH" app-notarize.zip

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e

          xcrun notarytool submit app-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait \
            --output-format json > notarization-result.json

          cat notarization-result.json

          STATUS="$(python3 -c 'import json; print(json.load(open("notarization-result.json"))["status"])')"
          ID="$(python3 -c 'import json; print(json.load(open("notarization-result.json"))["id"])')"

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed. Fetching Apple log..."

            xcrun notarytool log "$ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_PASSWORD"

            exit 1
          fi

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Create final app zip
        run: |
          # Preserve notarization/stapling data.
          # Do NOT use --norsrc or --noextattr here.
          ditto -c -k --keepParent "$APP_PATH" "Final-macOS.app.zip"

      - name: Upload notarized app to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Final-macOS.app.zip
